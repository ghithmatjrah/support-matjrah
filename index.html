<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مساعد دعم متجرة</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f11;--sur:#18181c;--sur2:#222228;--bor:#2e2e38;--acc:#e8365d;--acc2:#ff6b8a;--tx:#f0f0f4;--tx2:#9090a0;--tx3:#60606e;--grn:#2dd4a0;--r:14px;--rs:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
header{padding:1rem 1.5rem;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between;background:var(--sur);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:600}
.dot{width:10px;height:10px;background:var(--acc);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
.badge{font-size:12px;padding:4px 10px;background:rgba(232,54,93,.12);border:1px solid rgba(232,54,93,.25);border-radius:20px;color:var(--acc2)}
.tabs{display:flex;border-bottom:1px solid var(--bor);background:var(--sur);padding:0 1.5rem}
.tab{padding:12px 18px;font-size:14px;color:var(--tx3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--tx2)}
.tab.active{color:var(--tx);border-bottom-color:var(--acc)}
main{flex:1;max-width:780px;margin:0 auto;width:100%;padding:1.5rem}
.panel{display:none}.panel.active{display:block}
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 185px)}
.messages{flex:1;overflow-y:auto;padding:1rem 0;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--bor) transparent}
.msg{display:flex;gap:10px;align-items:flex-start}
.msg.user{flex-direction:row-reverse}
.av{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.av.bot{background:rgba(232,54,93,.15);color:var(--acc2);border:1px solid rgba(232,54,93,.2)}
.av.user{background:var(--sur2);color:var(--tx2);border:1px solid var(--bor)}
.bubble{padding:12px 16px;border-radius:var(--r);font-size:14px;line-height:1.7;max-width:85%;border:1px solid var(--bor)}
.msg.bot .bubble{background:var(--sur);border-radius:var(--r) var(--r) var(--r) 4px}
.msg.user .bubble{background:var(--sur2);border-radius:var(--r) var(--r) 4px var(--r)}
.steps-list{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.step{display:flex;gap:10px;align-items:flex-start;padding:8px 10px;background:var(--sur2);border-radius:var(--rs);border:1px solid var(--bor)}
.snum{min-width:24px;height:24px;background:rgba(232,54,93,.15);color:var(--acc2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;margin-top:1px}
.copy-btn{margin-top:10px;padding:6px 14px;font-size:12px;background:var(--sur2);border:1px solid var(--bor);border-radius:var(--rs);color:var(--tx2);cursor:pointer;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.copy-btn:hover{color:var(--tx);border-color:var(--acc)}
.sugs{display:flex;gap:8px;flex-wrap:wrap;padding:10px 0}
.sug{padding:6px 12px;font-size:12px;background:var(--sur2);border:1px solid var(--bor);border-radius:20px;color:var(--tx2);cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.sug:hover{border-color:var(--acc);color:var(--tx)}
.no-result{padding:16px;background:var(--sur2);border:1px solid var(--bor);border-radius:var(--r);font-size:14px;color:var(--tx2);line-height:1.6}
.no-result strong{color:var(--acc2)}
.input-area{padding:1rem 0 0;border-top:1px solid var(--bor)}
.input-row{display:flex;gap:8px}
.input-row textarea{flex:1;padding:11px 14px;font-size:14px;background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);color:var(--tx);font-family:inherit;resize:none;height:46px;transition:border-color .2s}
.input-row textarea:focus{outline:none;border-color:rgba(232,54,93,.5)}
.send-btn{width:46px;height:46px;background:var(--acc);border:none;border-radius:var(--r);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;transition:all .2s}
.send-btn:hover{background:var(--acc2);transform:scale(1.04)}
.hint{font-size:12px;color:var(--tx3);margin-top:8px}
.kb-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.kb-hdr h2{font-size:16px;font-weight:600}
.kb-stat{font-size:13px;color:var(--tx2)}
.kb-stat span{color:var(--acc2);font-weight:600}
.import-box{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);padding:1.2rem;margin-bottom:1.5rem}
.import-box h3{font-size:14px;font-weight:500;margin-bottom:8px;color:var(--tx2)}
.import-box textarea{width:100%;min-height:120px;padding:10px 12px;font-size:13px;background:var(--bg);border:1px solid var(--bor);border-radius:var(--rs);color:var(--tx);font-family:monospace;resize:vertical;line-height:1.6;direction:rtl}
.import-box textarea:focus{outline:none;border-color:rgba(232,54,93,.4)}
.imp-acts{display:flex;align-items:center;gap:10px;margin-top:10px}
.btn-p{padding:8px 18px;font-size:13px;background:var(--acc);border:none;border-radius:var(--rs);color:#fff;cursor:pointer;font-family:inherit;font-weight:500;transition:all .2s}
.btn-p:hover{background:var(--acc2)}
.btn-s{padding:8px 14px;font-size:13px;background:var(--sur2);border:1px solid var(--bor);border-radius:var(--rs);color:var(--tx2);cursor:pointer;font-family:inherit;transition:all .2s}
.btn-s:hover{color:var(--tx);border-color:var(--tx3)}
.kb-search{width:100%;padding:10px 14px;font-size:14px;background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);color:var(--tx);font-family:inherit;margin-bottom:1rem;transition:border-color .2s}
.kb-search:focus{outline:none;border-color:rgba(232,54,93,.4)}
.kb-list{display:flex;flex-direction:column;gap:8px}
.kb-item{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;transition:border-color .2s}
.kb-item:hover{border-color:var(--tx3)}
.kb-q{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:3px}
.kb-m{font-size:12px;color:var(--tx3)}
.kb-del{padding:5px 8px;background:none;border:1px solid transparent;border-radius:6px;color:var(--tx3);cursor:pointer;font-family:inherit;font-size:12px;flex-shrink:0;transition:all .2s}
.kb-del:hover{color:var(--acc);border-color:rgba(232,54,93,.3)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.5rem}
.stat{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);padding:16px;text-align:center}
.stat-n{font-size:26px;font-weight:600;color:var(--acc2)}
.stat-l{font-size:12px;color:var(--tx3);margin-top:4px}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--sur2);border:1px solid var(--bor);border-radius:var(--r);padding:10px 20px;font-size:13px;color:var(--tx);opacity:0;transition:all .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){main{padding:1rem}.stats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="dot"></div>مساعد دعم متجرة</div>
  <div class="badge">🔍 بحث ذكي</div>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('chat',this)">💬 البوت</button>
  <button class="tab" onclick="switchTab('kb',this)">📚 قاعدة المعرفة</button>
  <button class="tab" onclick="switchTab('stats',this)">📊 إحصائيات</button>
</div>
<main>

<div id="panel-chat" class="panel active">
  <div class="chat-wrap">
    <div class="messages" id="messages">
      <div class="msg bot">
        <div class="av bot">م</div>
        <div class="bubble">
          أهلاً! اكتب استفسار التاجر وسأعطيك الخطوات فوراً.
          <div class="sugs" id="sugs">
            <button class="sug" onclick="quickAsk(this)">كيف أضيف منتج مع خيارات؟</button>
            <button class="sug" onclick="quickAsk(this)">كيف أفعّل كوبون خصم؟</button>
            <button class="sug" onclick="quickAsk(this)">كيف أضيف طريقة دفع؟</button>
            <button class="sug" onclick="quickAsk(this)">كيف أغير حالة طلب؟</button>
            <button class="sug" onclick="quickAsk(this)">كيف أربط سيرش كونسول؟</button>
          </div>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="inp" placeholder="اكتب استفسار التاجر هنا..." onkeydown="handleKey(event)" rows="1"></textarea>
        <button class="send-btn" onclick="sendMsg()">➤</button>
      </div>
      <p class="hint">اضغط Enter للإرسال — Shift+Enter لسطر جديد</p>
    </div>
  </div>
</div>

<div id="panel-kb" class="panel">
  <div class="kb-hdr">
    <h2>قاعدة المعرفة</h2>
    <div class="kb-stat">إجمالي: <span id="kbCount">0</span> استفسار</div>
  </div>
  <div class="import-box">
    <h3>إضافة استفسارات جديدة دفعة واحدة</h3>
    <textarea id="bulkIn" placeholder="س: كيف أضيف تصنيف؟&#10;ج: من القائمة الجانبية...&#10;&#10;س: كيف أربط دومين؟&#10;ج: من الإعدادات..."></textarea>
    <div class="imp-acts">
      <button class="btn-p" onclick="bulkImport()">استيراد</button>
      <button class="btn-s" onclick="document.getElementById('bulkIn').value=''">مسح</button>
      <span id="impMsg" style="font-size:12px;color:var(--grn)"></span>
    </div>
  </div>
  <input type="text" class="kb-search" id="kbSrch" placeholder="ابحث في قاعدة المعرفة..." oninput="renderKB()"/>
  <div class="kb-list" id="kbList"></div>
</div>

<div id="panel-stats" class="panel">
  <div class="stats-grid">
    <div class="stat"><div class="stat-n" id="s1">0</div><div class="stat-l">في قاعدة المعرفة</div></div>
    <div class="stat"><div class="stat-n" id="s2">0</div><div class="stat-l">أسئلة هذه الجلسة</div></div>
    <div class="stat"><div class="stat-n" id="s3">0</div><div class="stat-l">إجابات تم نسخها</div></div>
  </div>
  <div style="background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);padding:1.2rem">
    <h3 style="font-size:14px;font-weight:500;margin-bottom:12px;color:var(--tx2)">آخر الأسئلة</h3>
    <div id="recentQ" style="font-size:13px;color:var(--tx3)">لا توجد أسئلة بعد.</div>
  </div>
</div>

</main>
<div class="toast" id="toast"></div>

<script>

let KB=[], sessCount=0, copyCount=0, recentQ=[];

function init(){
  const saved=localStorage.getItem('matjara_kb_v3');
  if(saved){try{KB=JSON.parse(saved)}catch(e){KB=[...DEFAULT_KB]}}
  else{KB=[...DEFAULT_KB];saveKB()}
  renderKB();updateStats();
}

function saveKB(){
  localStorage.setItem('matjara_kb_v3',JSON.stringify(KB));
  document.getElementById('kbCount').textContent=KB.length;
  document.getElementById('s1').textContent=KB.length;
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}}
function quickAsk(btn){document.getElementById('inp').value=btn.textContent;document.getElementById('sugs').style.display='none';sendMsg()}

function smartSearch(query){
  const q=query.trim().toLowerCase();
  if(!q)return[];

  // tokenize query
  const tokens=q.split(/\s+/).filter(t=>t.length>1);

  const scored=KB.map(item=>{
    const haystack=(item.q+' '+item.steps.join(' ')).toLowerCase();
    let score=0;

    // exact phrase match - highest score
    if(haystack.includes(q))score+=100;

    // each token match
    tokens.forEach(t=>{
      if(item.q.toLowerCase().includes(t))score+=20;
      else if(haystack.includes(t))score+=8;
    });

    // keyword synonyms
    const synonyms={
      'اضافة':['أضيف','اضف','اضافه','إضافة'],
      'تعديل':['أعدل','تغيير','أغير','تعديل'],
      'حذف':['أحذف','مسح','ازالة'],
      'ربط':['أربط','تفعيل','تفعل','ربط','اتصال'],
      'كوبون':['خصم','قسيمة','تخفيض'],
      'منتج':['سلعة','بضاعة'],
      'طلب':['اوردر','order'],
      'شحن':['توصيل','delivery'],
      'دفع':['payment','بوابة'],
      'seo':['سيو','محركات البحث','جوجل'],
    };
    Object.values(synonyms).forEach(group=>{
      if(group.some(s=>q.includes(s))||tokens.some(t=>group.some(s=>s.includes(t)))){
        if(group.some(s=>haystack.includes(s)))score+=15;
      }
    });

    return{item,score};
  });

  return scored.filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,3).map(x=>x.item);
}

function sendMsg(){
  const inp=document.getElementById('inp');
  const q=inp.value.trim();
  if(!q)return;
  inp.value='';

  sessCount++;recentQ.unshift(q);
  if(recentQ.length>15)recentQ.pop();
  updateStats();
  appendMsg('user',q);

  const results=smartSearch(q);

  setTimeout(()=>{
    if(!results.length){
      appendNoResult(q);
    } else {
      results.forEach((item,i)=>{
        appendResult(item, i===0);
      });
    }
  },300);
}

function appendMsg(role,text){
  const c=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML=`${role==='bot'?'<div class="av bot">م</div>':''}
    <div><div class="bubble"><p>${text}</p></div></div>
    ${role==='user'?'<div class="av user">👤</div>':''}`;
  c.appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});
}

function appendResult(item, showCopy){
  const c=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg bot';
  const stepsHtml=item.steps.map((s,i)=>`
    <div class="step">
      <div class="snum">${i+1}</div>
      <div style="font-size:13px;line-height:1.6">${s.replace(/\(([^)]+)\)/g,'<strong>($1)</strong>')}</div>
    </div>`).join('');
  const copyBtn=showCopy?`<button class="copy-btn" onclick="copyReply(this)">📋 نسخ الرد للتاجر</button>`:'';
  d.innerHTML=`<div class="av bot">م</div>
    <div><div class="bubble">
      <p style="font-weight:500;margin-bottom:8px;color:var(--acc2)">${item.q}</p>
      <div class="steps-list">${stepsHtml}</div>
      ${copyBtn}
    </div></div>`;
  c.appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});
}

function appendNoResult(q){
  const c=document.getElementById('messages');
  const d=document.createElement('div');
  d.className='msg bot';
  d.innerHTML=`<div class="av bot">م</div>
    <div><div class="bubble no-result">
      لم أجد إجابة لـ "<strong>${q}</strong>" في قاعدة المعرفة.<br>
      <span style="font-size:12px;color:var(--tx3);margin-top:6px;display:block">💡 أضف هذا الاستفسار من تبويب قاعدة المعرفة</span>
    </div></div>`;
  c.appendChild(d);d.scrollIntoView({behavior:'smooth',block:'end'});
}

function copyReply(btn){
  const bubble=btn.closest('.bubble');
  const text=bubble.innerText.replace('📋 نسخ الرد للتاجر','').trim();
  navigator.clipboard.writeText(text).then(()=>{copyCount++;updateStats();showToast('تم نسخ الرد ✓')});
}

function renderKB(){
  const srch=(document.getElementById('kbSrch')?.value||'').toLowerCase();
  const filtered=KB.filter(k=>!srch||k.q.toLowerCase().includes(srch)||k.steps.some(s=>s.toLowerCase().includes(srch)));
  document.getElementById('kbCount').textContent=KB.length;
  const el=document.getElementById('kbList');
  if(!filtered.length){el.innerHTML='<p style="font-size:13px;color:var(--tx3);padding:1rem 0">لا توجد نتائج.</p>';return}
  el.innerHTML=filtered.map(item=>`
    <div class="kb-item">
      <div style="flex:1">
        <div class="kb-q">${item.q}</div>
        <div class="kb-m">${item.steps.length} خطوات</div>
      </div>
      <button class="kb-del" onclick="delKB(${item.id})">حذف</button>
    </div>`).join('');
}

function delKB(id){KB=KB.filter(k=>k.id!==id);saveKB();renderKB();updateStats();showToast('تم الحذف')}

function bulkImport(){
  const raw=document.getElementById('bulkIn').value.trim();
  if(!raw)return;
  const blocks=raw.split(/\n(?=س:)/g);
  let added=0;
  blocks.forEach(block=>{
    const qm=block.match(/^س:\s*(.+)/m);
    const am=block.match(/^ج:\s*([\s\S]+)/m);
    if(qm&&am){
      const q=qm[1].trim();
      const steps=am[1].trim().split('\n').map(s=>s.trim()).filter(Boolean);
      if(!KB.find(k=>k.q===q)){KB.push({id:Date.now()+Math.random(),q,steps});added++}
    }
  });
  if(added){saveKB();renderKB();updateStats();document.getElementById('bulkIn').value='';
    document.getElementById('impMsg').textContent=`✓ تمت إضافة ${added} استفسار`;
    setTimeout(()=>document.getElementById('impMsg').textContent='',3000);
  } else {document.getElementById('impMsg').textContent='تحقق من التنسيق'}
}

function updateStats(){
  document.getElementById('s1').textContent=KB.length;
  document.getElementById('s2').textContent=sessCount;
  document.getElementById('s3').textContent=copyCount;
  const rq=document.getElementById('recentQ');
  rq.innerHTML=recentQ.length?recentQ.map(q=>`<div style="padding:7px 0;border-bottom:1px solid var(--bor);color:var(--tx2)">${q}</div>`).join(''):'<span>لا توجد أسئلة بعد.</span>';
}

function switchTab(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='kb')renderKB();
  if(name==='stats')updateStats();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

init();
</script>
</body>
</html>
